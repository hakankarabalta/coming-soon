<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Yakında</title>
  <meta name="description" content="Üzerinde çalıştığımız bir şey var. Çok yakında." />
  <meta property="og:title"       content="Yakında" />
  <meta property="og:description" content="Bir şeyler geliyor. Hazır ol." />
  <meta property="og:type"        content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <header>
      <div class="badge">
        <span class="dot"></span>
        <span id="badge-text"></span>
      </div>
    </header>

    <main class="hero">
      <p  id="eyebrow"  class="eyebrow"></p>
      <h1 id="title"    class="title"></h1>
      <div class="divider"></div>
      <p  id="subtitle" class="subtitle"></p>
    </main>

    <section class="contact" aria-label="İletişim">
      <div class="contact-label">
        <strong id="contact-heading"></strong>
        <span   id="contact-subtext"></span>
      </div>
      <nav class="social-grid" id="social-grid" aria-label="Sosyal bağlantılar"></nav>
    </section>

    <footer class="footer" id="footer"></footer>

  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
